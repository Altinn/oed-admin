name: SonarQube Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *' # Runs every day at 02:30 UTC

env:
  DOTNET_VERSION: "10.0.102"
  QATESTS: "1"

jobs:
  projecttests:
    runs-on: ubuntu-latest
    name: Run QaTests
    # id-token: write is required so the workflow can mint an OIDC token that azure/login
    # exchanges for an Azure AD access token (no long-lived secret in the workflow). contents: read
    # is the standard checkout grant.
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build -c Release --no-restore

    # Federated login via GitHub OIDC. The three vars.AZURE_* values are not secrets — they're
    # public identifiers for the app registration, tenant, and subscription. The federated
    # credential on the app reg is what restricts which repo+branch can authenticate.
    # Exports AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, AZURE_FEDERATED_TOKEN_FILE
    # into the workflow env; DefaultAzureCredential in Altinn.Dd.Tests.SonarGate picks them up.
    - name: Azure login (federated OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ vars.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    - name: Run QA tests
      run: dotnet test QaTests --no-restore --verbosity normal
