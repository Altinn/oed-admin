name: SonarQube Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *' # Runs every day at 02:30 UTC

env:
  DOTNET_VERSION: "10.0.102"
  QATESTS: "1"

jobs:
  projecttests:
    runs-on: ubuntu-latest
    name: Run QaTests
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build -c Release --no-restore

    # Altinn.Dd.Tests.SonarGate archives the snapshot to oedqa blob (auth via SAS secret) and
    # builds the SWA bundle locally under QaTests/TestResults/swa-bundle/. The actual upload to
    # SWA happens in the next step using Microsoft's supported deploy action.
    - name: Run QA tests
      env:
        AZURE_STORAGE_SAS_TOKEN: ${{ secrets.AZURE_STORAGE_SAS_TOKEN }}
      run: dotnet test QaTests --no-restore --verbosity normal

    - name: Deploy dashboard to SWA
      if: success()
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        action: upload
        app_location: QaTests/TestResults/swa-bundle
        skip_app_build: true
        output_location: ''
