name: SonarQube Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *' # Runs every day at 02:30 UTC

env:
  DOTNET_VERSION: "10.0.102"
  QATESTS: "1"

jobs:
  projecttests:
    runs-on: ubuntu-latest
    name: Run QaTests
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up .NET
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build -c Release --no-restore

    # Altinn.Dd.Tests.SonarGate scans the project, archives the snapshot to the oedqa blob
    # container, and publishes the dashboard to the account's $web static-website container
    # (auth via the SAS secret). No separate deploy step or hosting token is needed.
    - name: Run QA tests
      env:
        AZURE_STORAGE_SAS_TOKEN: ${{ secrets.AZURE_STORAGE_SAS_TOKEN }}
      run: dotnet test QaTests --no-restore --verbosity normal
