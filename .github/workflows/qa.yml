name: SonarQube Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *' # Runs every day at 02:30 UTC

env:
  DOTNET_VERSION: "10.0.102"
  QATESTS: "1"

jobs:
  projecttests:
    runs-on: ubuntu-latest
    name: Run QaTests
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build -c Release --no-restore

    # Altinn.Dd.Tests.SonarGate publishes snapshots to the oedqa storage account. Auth uses a
    # container-scoped SAS (rwl on the "reports" container) stored as a repo secret — we can't
    # use federated AAD here because creating the app registration requires tenant-admin perms
    # we don't have. The env var only lives for the duration of this step; GitHub auto-masks
    # values pulled from secrets.* so the SAS never appears in logs.
    - name: Run QA tests
      env:
        AZURE_STORAGE_SAS_TOKEN: ${{ secrets.AZURE_STORAGE_SAS_TOKEN }}
      run: dotnet test QaTests --no-restore --verbosity normal
