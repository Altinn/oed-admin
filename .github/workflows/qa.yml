name: SonarQube Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *' # Runs every day at 02:30 UTC

env:
  DOTNET_VERSION: "10.0.102"
  QATESTS: "1"

jobs:
  projecttests:
    runs-on: ubuntu-latest
    name: Run QaTests
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build -c Release --no-restore

    # Altinn.Dd.Tests.SonarGate publishes in two parts:
    #   - Archives the snapshot to the oedqa blob container (auth via the SAS secret).
    #   - Deploys the regenerated dashboard to Azure Static Web Apps (auth via the SWA token).
    # Both env vars live for only the duration of this step; GitHub auto-masks values pulled
    # from secrets.* so neither token appears in workflow logs.
    - name: Run QA tests
      env:
        AZURE_STORAGE_SAS_TOKEN: ${{ secrets.AZURE_STORAGE_SAS_TOKEN }}
        AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
      run: dotnet test QaTests --no-restore --verbosity normal
